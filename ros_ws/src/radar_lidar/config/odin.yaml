/**:
  ros__parameters:
    map_path: "/workspace/model/generated/map.pcd"
    scan_topic: "/odin1/cloud_raw"
    hardware_id: "odin1"
    output_frame: "map"

    gicp:
      num_threads: 4
      max_corr_distance: 1.0
      max_iterations: 48
      use_spherical_grid: true
      spherical_grid_deg: 0.1
      accumulate_frames: 20
      use_lock_strategy: false
      lock_fitness: 0.2
      use_roi: false
      roi_x_min: 0.0
      roi_x_max: 30.0
      roi_y_min: -15.0
      roi_y_max: 15.0
      roi_z_min: 0.0
      roi_z_max: 7.0
