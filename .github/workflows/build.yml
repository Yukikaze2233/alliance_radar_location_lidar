name: Build & Format Check
on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ros:jazzy
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
          persist-credentials: false

      - name: Init submodules
        run: |
          git config --global --add safe.directory /__w/alliance_radar_location_lidar/alliance_radar_location_lidar
          git submodule update --init --recursive --jobs 4

      - name: Install system deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            wget gnupg \
            libopencv-dev libassimp-dev libeigen3-dev \
            libzmq3-dev libyaml-cpp-dev libomp-dev libpcl-dev
          mkdir -p /etc/apt/keyrings
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | \
            gpg --dearmor -o /etc/apt/keyrings/apt.llvm.org.gpg
          chmod 644 /etc/apt/keyrings/apt.llvm.org.gpg
          echo "deb [signed-by=/etc/apt/keyrings/apt.llvm.org.gpg] https://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" \
            > /etc/apt/sources.list.d/llvm.list
          apt-get update
          apt-get install -y --no-install-recommends clang-format-22
          update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-22 50

      - name: Install ROS deps
        run: |
          rosdep update
          rosdep install --from-paths ros_ws/src ros_ws/third-party --ignore-src -r -y

      - name: Build third-party (small_gicp + hikcamera)
        run: |
          source /opt/ros/jazzy/setup.bash
          cd ros_ws
          colcon build --packages-select small_gicp hikcamera \
            --cmake-args -DCMAKE_BUILD_TYPE=Release -Wno-dev

      - name: Build radar packages
        run: |
          source /opt/ros/jazzy/setup.bash
          cd ros_ws
          source install/setup.bash
          colcon build --packages-select radar_lidar radar_camera radar_fusion radar_bridge radar_model radar_bringup radar_calibration \
            --cmake-args \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_CXX_FLAGS="-Wno-missing-field-initializers -Wno-unused-parameter" \
              -Wno-dev

      - name: Format check (clang-format)
        run: |
          find ros_ws/src \
            -type f \( -name '*.cpp' -o -name '*.hpp' \) \
            -print0 | xargs -0 clang-format --dry-run --Werror
