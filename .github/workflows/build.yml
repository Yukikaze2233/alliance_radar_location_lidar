name: Build & Format Check
on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/harrypotter1tech/radar:develop
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
          persist-credentials: false

      - name: Init submodules
        run: |
          git config --global --add safe.directory /__w/alliance_radar_location_lidar/alliance_radar_location_lidar
          git submodule update --init --recursive --jobs 4

      - name: Install ROS deps
        run: |
          rosdep update
          rosdep install --from-paths ros_ws/src ros_ws/third-party --ignore-src -r -y

      - name: Build third-party (small_gicp + hikcamera)
        run: |
          source /opt/ros/jazzy/setup.bash
          cd ros_ws
          colcon build --packages-select small_gicp hikcamera \
            --cmake-args -DCMAKE_BUILD_TYPE=Release -Wno-dev

      - name: Build direct_visual_lidar_calibration
        run: |
          source /opt/ros/jazzy/setup.bash
          cd ros_ws
          colcon build --packages-select direct_visual_lidar_calibration \
            --cmake-args \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_CXX_STANDARD=17 \
              -DCMAKE_CXX_FLAGS="-Wno-maybe-uninitialized -Wno-template-id-cdtor" \
              -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
              -Wno-dev

      - name: Build radar packages
        run: |
          source /opt/ros/jazzy/setup.bash
          cd ros_ws
          source install/setup.bash
          colcon build --packages-select radar_lidar radar_camera radar_fusion radar_bridge radar_model radar_bringup radar_calibration \
            --cmake-args \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_CXX_FLAGS="-Wno-missing-field-initializers -Wno-unused-parameter" \
              -Wno-dev

      - name: Format check (clang-format)
        run: |
          find ros_ws/src \
            -type f \( -name '*.cpp' -o -name '*.hpp' \) \
            -print0 | xargs -0 clang-format --dry-run --Werror
