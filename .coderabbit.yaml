# CodeRabbit AI Code Review Configuration
# https://docs.coderabbit.ai

language: "zh-CN"

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  collapse_walkthrough: false
  sequence_diagrams: true

  auto_review:
    enabled: true
    drafts: false
    base_branches: ["master", "main"]

  path_instructions:
    - path: "README.md"
      instructions: |
        Review the README for:
        - Accuracy: do all commands work in the Docker container at /workspace?
        - Completeness: are all scripts, drivers, and workflows documented?
        - Structure: is the navigation logical for a new developer?
        - Markdown linting: proper code fences, table alignment, link validity.

    - path: "Dockerfile"
      instructions: |
        Review Dockerfile for:
        - Multi-stage build correctness (radar-base → radar-develop).
        - Layer caching: combine related RUN commands, avoid unnecessary cache busting.
        - Multi-arch support: TARGETARCH handling for amd64/arm64.
        - Security: no secrets in image, minimal attack surface.
        - Hik MVS SDK installation: correct paths, cmake config generation.
        - rosdep dependency resolution completeness.

    - path: ".devcontainer/**"
      instructions: |
        Review devcontainer config for:
        - Volume mounts: host ~/.opencode, ~/.codex, ~/.mimocode properly mounted.
        - VSCode extensions: clangd, Python, CMake, git-graph included.
        - post-create.sh: submodules init, first-time build, error handling.
        - docker-compose.yml: privileged mode, device access, network config.

    - path: ".script/**"
      instructions: |
        Review shell scripts for:
        - POSIX compatibility and bash best practices.
        - Proper quoting, error handling (`set -euo pipefail`).
        - PATH/source correctness inside the Docker container (/workspace paths).
        - Scripts should be idempotent and safe to re-run.

    - path: "ros_ws/src/radar_localization_lidar/src/**/*.cpp"
      instructions: |
        Review C++ source files from modern C++ and design patterns perspective:

        ## Modern C++ (C++23)
        1. std::expected for error handling (project standard), std::optional, std::variant.
        2. std::format over printf/cout/sprintf for string formatting.
        3. std::span for non-owning array views, std::ranges for algorithm composition.
        4. Designated initializers, structured bindings, if-init statements.
        5. constexpr / consteval where computation can happen at compile time.
        6. Deducing this (explicit object parameter) for CRTP simplification.
        7. std::expected<T,E> as return type — never use error codes or exceptions for business logic.

        ## Design Patterns
        1. PIMPL (already used): verify complete implementation in .cpp, no leaking of impl details.
        2. RAII: all resources (memory, file handles, ROS subscriptions) must have owning wrappers.
        3. Strategy pattern: configurable algorithms (e.g., point cloud processing) should use std::function or template policy, not runtime if-else chains.
        4. Observer: ROS callbacks should be lightweight; decouple data reception from processing.
        5. Builder: complex object construction (model loading, sensor config) should use builder or named parameters.
        6. CRTP vs virtual: prefer CRTP for compile-time polymorphism in hot paths, virtual only for runtime-polymorphic interfaces.

        ## Memory & Performance
        1. Eigen: prefer Map over copy, check alignment, avoid dynamic allocation in tight loops.
        2. reserve() before known-size loops, emplace_back over push_back.
        3. Move semantics: return value optimization, std::move for ownership transfer.
        4. Cache-friendly data layouts: SoA over AoS for large arrays processed in parallel.

        ## ROS2 Specific
        1. Lifecycle nodes for state management, parameter declaration at construction.
        2. QoS profiles matched between publisher/subscriber.
        3. Callback groups for concurrency control, avoid blocking callbacks.

        ## Error Handling
        1. std::expected consistently — no raw error codes mixed with std::expected.
        2. Fail fast with descriptive messages, no silent swallowing of errors.
        3. [[nodiscard]] on all functions whose return values must not be ignored.

    - path: "ros_ws/src/radar_localization_lidar/src/**/*.hpp"
      instructions: |
        Review C++ header files from modern C++ and design patterns perspective:

        ## Interface Design
        1. Single Responsibility: each header should have one clear purpose.
        2. Minimal includes: forward-declare what you can, especially in PIMPL pattern.
        3. Dependency Inversion: depend on abstractions (interfaces) not concretions.
        4. Interface segregation: split large interfaces into focused ones.

        ## Modern C++ Correctness
        1. #pragma once or include guards — no exceptions.
        2. noexcept on destructors, move constructors, move assignment.
        3. [[nodiscard]] on all non-void return functions.
        4. const-correctness: const member functions, const references for read-only params.
        5. Rule of Zero/Five: if class manages resources, declare all five; if not, declare none.
        6. std::expected<T,E> for return types, not std::optional with side-effect error reporting.

        ## Template & Generic Programming
        1. Concepts (C++20) for constraining template parameters where appropriate.
        2. SFINAE / if-constexpr for compile-time dispatch, not runtime type checking.
        3. constexpr functions for compile-time computable logic.

        ## Header Organization
        1. Include order: own header → C++ std → third-party → project headers.
        2. Avoid circular dependencies via forward declarations and dependency inversion.
        3. PIMPL: class definition has only forward-declared Impl, no impl details in header.

    - path: "ros_ws/src/radar_localization_lidar/CMakeLists.txt"
      instructions: |
        Review CMakeLists.txt for:
        - Modern CMake practices (target_* instead of directory-level).
        - Proper find_package and dependency handling.
        - Build type separation: Release vs Debug flags correctness.
        - Compile option propagation with generator expressions.
        - ROS2 ament conventions compliance.
        - No duplicate link targets between target_link_libraries and ament_target_dependencies.

    - path: "ros_ws/src/radar_localization_lidar/config/**/*.yaml"
      instructions: |
        Review YAML config files for:
        - Schema consistency: are all fields documented?
        - Default values: are they sensible for production?
        - Validate sensor extrinsic/intrinsic naming conventions.

  path_filters:
    - "!ros_ws/build/**"
    - "!ros_ws/install/**"
    - "!ros_ws/log/**"
    - "!ros_ws/third-party/**"
    - "!lidar_ros_driver/**"
    - "!docs/**"
    - "!.vscode/**"

chat:
  auto_reply: true
