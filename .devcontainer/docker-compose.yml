services:
  radar-develop:
    build:
      context: ..
      dockerfile: Dockerfile
      target: radar-develop
      args:
        TARGETARCH: ${TARGETARCH:-amd64}
    user: "1000:1000"
    privileged: true
    volumes:
      # Project source (bind mount)
      - ..:/workspace:bind
      # Device access
      - /dev:/dev:bind
      # X11 display
      - /tmp/.X11-unix:/tmp/.X11-unix:bind
      # Host opencode config (any device's ~/.opencode)
      - ${HOME}/.opencode:/home/ubuntu/.opencode:cached
      # Host codex config
      - ${HOME}/.codex:/home/ubuntu/.codex:cached
      # Host mimocode config
      - ${HOME}/.mimocode:/home/ubuntu/.mimocode:cached
      # Host XDG config (optional, for shared tool settings)
      - ${HOME}/.config/opencode:/home/ubuntu/.config/opencode:cached
    environment:
      - DISPLAY=${DISPLAY}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY}
    network_mode: host
    tty: true
    stdin_open: true
